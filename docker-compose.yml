version: '3.9'

# MINDEX Earth Data Platform — Docker Compose
# =============================================
# Full stack: PostgreSQL + Redis + API + ETL + Earth Sync
#
# Architecture:
#   PostgreSQL (hot, <5ms) → Redis (cache, <1ms) → Supabase (cloud, <50ms) → NAS (cold)
#
# Usage:
#   docker compose up -d                          # Start core (db + redis + api)
#   docker compose --profile etl up -d            # Start with ETL worker
#   docker compose --profile earth up -d          # Start with Earth data sync
#   docker compose --profile init up etl-init     # One-time data load
#   docker compose --profile full up -d           # Start everything
#   docker compose logs -f api                    # Watch API logs
#   docker compose down -v                        # Stop and remove volumes

networks:
  mindex-network:
    driver: bridge

services:
  # =========================================================================
  # PostgreSQL + PostGIS (HOT TIER — <5ms)
  # =========================================================================
  db:
    image: postgis/postgis:16-3.4
    container_name: mindex-postgres
    environment:
      POSTGRES_DB: ${MINDEX_DB_NAME:-mindex}
      POSTGRES_USER: ${MINDEX_DB_USER:-mindex}
      POSTGRES_PASSWORD: ${MINDEX_DB_PASSWORD:-mindex}
    ports:
      - "${MINDEX_DB_PORT:-5432}:5432"
    volumes:
      - mindex-postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MINDEX_DB_USER:-mindex} -d ${MINDEX_DB_NAME:-mindex}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindex-network
    restart: unless-stopped

  # =========================================================================
  # Redis (CACHE TIER — <1ms)
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: mindex-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "${MINDEX_REDIS_PORT:-6379}:6379"
    volumes:
      - mindex-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - mindex-network
    restart: unless-stopped

  # =========================================================================
  # MINDEX API (FastAPI)
  # =========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-}
    container_name: mindex-api
    command: uvicorn mindex_api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      # Database
      MINDEX_DB_HOST: db
      MINDEX_DB_PORT: 5432
      MINDEX_DB_USER: ${MINDEX_DB_USER:-mindex}
      MINDEX_DB_PASSWORD: ${MINDEX_DB_PASSWORD:-mindex}
      MINDEX_DB_NAME: ${MINDEX_DB_NAME:-mindex}

      # Redis Cache
      REDIS_URL: redis://redis:6379/0

      # Supabase (cloud middleware)
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

      # NAS Storage
      NAS_MOUNT_PATH: ${NAS_MOUNT_PATH:-/mnt/nas/mindex}

      # API Configuration
      API_TITLE: "MINDEX API"
      API_VERSION: "3.0.0"
      API_PREFIX: "/api/mindex"
      API_KEYS: '["${MINDEX_API_KEY:-change-me}"]'

      # CORS - Allow NatureOS, CREP, and other local services
      API_CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001","http://localhost:3002","http://127.0.0.1:3000","http://natureos-web:3000","http://crep-web:3000"]'

      # Earth data API keys (optional, enables higher rate limits)
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      NASA_FIRMS_MAP_KEY: ${NASA_FIRMS_MAP_KEY:-}

      # Git SHA for version endpoint
      GIT_SHA: ${GIT_SHA:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${MINDEX_API_PORT:-8000}:8000"
    volumes:
      # Hot reload for development
      - ./mindex_api:/app/mindex_api:ro
      - ./mindex_etl:/app/mindex_etl:ro
      # NAS mount (if available)
      - ${NAS_MOUNT_PATH:-/mnt/nas/mindex}:/mnt/nas/mindex:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/mindex/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mindex-network
    restart: unless-stopped

  # =========================================================================
  # ETL Worker — Legacy data sync (fungi, compounds, genetics)
  # =========================================================================
  etl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindex-etl
    command: python -m mindex_etl.scheduler --interval 60
    environment:
      MINDEX_DB_HOST: db
      MINDEX_DB_PORT: 5432
      MINDEX_DB_USER: ${MINDEX_DB_USER:-mindex}
      MINDEX_DB_PASSWORD: ${MINDEX_DB_PASSWORD:-mindex}
      MINDEX_DB_NAME: ${MINDEX_DB_NAME:-mindex}
      DATABASE_URL: postgresql://${MINDEX_DB_USER:-mindex}:${MINDEX_DB_PASSWORD:-mindex}@db:5432/${MINDEX_DB_NAME:-mindex}
      REDIS_URL: redis://redis:6379/0
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      NASA_FIRMS_MAP_KEY: ${NASA_FIRMS_MAP_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./mindex_etl:/app/mindex_etl:ro
      - ${NAS_MOUNT_PATH:-/mnt/nas/mindex}:/mnt/nas/mindex:rw
    networks:
      - mindex-network
    restart: unless-stopped
    profiles:
      - etl
      - full

  # =========================================================================
  # Earth Data Sync — Real-time planetary data ingestion
  # =========================================================================
  earth-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindex-earth-sync
    # Use sh heredoc — inline python -c with colons breaks YAML (while True:)
    command:
      - /bin/sh
      - -c
      - |
        exec python -u <<'PY'
        import time
        import logging
        logging.basicConfig(level=logging.INFO)
        from mindex_etl.jobs.sync_earth_data import run_realtime_sync
        while True:
            try:
                run_realtime_sync()
            except Exception as e:
                logging.error("Earth sync error: %s", e)
            time.sleep(900)
        PY
    environment:
      MINDEX_DB_HOST: db
      MINDEX_DB_PORT: 5432
      MINDEX_DB_USER: ${MINDEX_DB_USER:-mindex}
      MINDEX_DB_PASSWORD: ${MINDEX_DB_PASSWORD:-mindex}
      MINDEX_DB_NAME: ${MINDEX_DB_NAME:-mindex}
      DATABASE_URL: postgresql://${MINDEX_DB_USER:-mindex}:${MINDEX_DB_PASSWORD:-mindex}@db:5432/${MINDEX_DB_NAME:-mindex}
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      NASA_FIRMS_MAP_KEY: ${NASA_FIRMS_MAP_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./mindex_etl:/app/mindex_etl:ro
    networks:
      - mindex-network
    restart: unless-stopped
    profiles:
      - earth
      - full

  # =========================================================================
  # One-time initial data load
  # =========================================================================
  etl-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindex-etl-init
    command: python -m mindex_etl.jobs.run_all --incremental --max-pages 20
    environment:
      MINDEX_DB_HOST: db
      MINDEX_DB_PORT: 5432
      MINDEX_DB_USER: ${MINDEX_DB_USER:-mindex}
      MINDEX_DB_PASSWORD: ${MINDEX_DB_PASSWORD:-mindex}
      MINDEX_DB_NAME: ${MINDEX_DB_NAME:-mindex}
      DATABASE_URL: postgresql://${MINDEX_DB_USER:-mindex}:${MINDEX_DB_PASSWORD:-mindex}@db:5432/${MINDEX_DB_NAME:-mindex}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./mindex_etl:/app/mindex_etl:ro
    networks:
      - mindex-network
    profiles:
      - init

  # =========================================================================
  # GPU-accelerated MINDEX API (NVIDIA RAPIDS: cuDF + cuVS)
  # =========================================================================
  api-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
      args:
        GIT_SHA: ${GIT_SHA:-}
    container_name: mindex-api-gpu
    command: uvicorn mindex_api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      # Database
      MINDEX_DB_HOST: db
      MINDEX_DB_PORT: 5432
      MINDEX_DB_USER: ${MINDEX_DB_USER:-mindex}
      MINDEX_DB_PASSWORD: ${MINDEX_DB_PASSWORD:-mindex}
      MINDEX_DB_NAME: ${MINDEX_DB_NAME:-mindex}

      # Redis Cache
      REDIS_URL: redis://redis:6379/0

      # Supabase
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

      # NAS Storage
      NAS_MOUNT_PATH: ${NAS_MOUNT_PATH:-/mnt/nas/mindex}

      # API Configuration
      API_TITLE: "MINDEX API (GPU)"
      API_VERSION: "3.0.0"
      API_PREFIX: "/api/mindex"
      API_KEYS: '["${MINDEX_API_KEY:-change-me}"]'
      API_CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001","http://localhost:3002"]'

      # GPU Acceleration
      GPU_ENABLED: "true"
      GPU_DEVICE_ID: "0"
      GPU_MEMORY_LIMIT_GB: "0"
      CUVS_INDEX_DIR: /data/cuvs_indexes

      # STATIC (via MAS)
      STATIC_ENABLED: "${STATIC_ENABLED:-false}"
      STATIC_MAS_ENDPOINT: "${STATIC_MAS_ENDPOINT:-}"

      # Earth data API keys
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      GIT_SHA: ${GIT_SHA:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${MINDEX_GPU_API_PORT:-8001}:8000"
    volumes:
      - ./mindex_api:/app/mindex_api:ro
      - ./mindex_etl:/app/mindex_etl:ro
      - ${NAS_MOUNT_PATH:-/mnt/nas/mindex}:/mnt/nas/mindex:rw
      - cuvs-indexes:/data/cuvs_indexes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/mindex/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mindex-network
    restart: unless-stopped
    profiles:
      - gpu

volumes:
  mindex-postgres-data:
  mindex-redis-data:
  cuvs-indexes:
