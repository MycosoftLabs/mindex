name: build-and-deploy-azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: mindex-api

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run tests
        run: pytest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure Container Registry login
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          IMAGE_TAG=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  agentic-fallback:
    if: failure()
    needs: [build-test-push]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Agentic Healing
        env:
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
        run: |
          if [ -z "$AGENT_API_KEY" ]; then echo "AGENT_API_KEY not set; skipping"; exit 0; fi
          curl -fsS -X POST https://api.mycosoft.com/agent/auto-fix \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $AGENT_API_KEY" \
            -d "{\"repo\": \"$GITHUB_REPOSITORY\", \"run_id\": \"$GITHUB_RUN_ID\"}"
