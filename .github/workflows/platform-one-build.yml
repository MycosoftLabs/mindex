name: platform-one-build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: platform-one-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-hardened-image:
    runs-on: ubuntu-latest
    env:
      IRON_BANK_REGISTRY: ${{ secrets.IRON_BANK_REGISTRY }}
      IRON_BANK_USERNAME: ${{ secrets.IRON_BANK_USERNAME }}
      IRON_BANK_PASSWORD: ${{ secrets.IRON_BANK_PASSWORD }}
      IRON_BANK_BASE_IMAGE: ${{ secrets.IRON_BANK_BASE_IMAGE }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      # Exit 5 when no tests are collected — keep flag so optional Iron Bank push still runs if tests expand later
      - name: Run unit tests
        run: pytest --suppress-no-test-exit-code

      - name: Authenticate to Iron Bank Registry
        if: ${{ env.IRON_BANK_REGISTRY != '' }}
        run: |
          echo "${IRON_BANK_PASSWORD}" | docker login "${IRON_BANK_REGISTRY}" -u "${IRON_BANK_USERNAME}" --password-stdin

      - name: Build hardened image
        if: ${{ env.IRON_BANK_REGISTRY != '' }}
        run: |
          docker build \
            --build-arg BASE_IMAGE=${IRON_BANK_BASE_IMAGE} \
            -t ${IRON_BANK_REGISTRY}/mindex/mindex-api:${{ github.sha }} .

      - name: Push hardened image
        if: ${{ env.IRON_BANK_REGISTRY != '' }}
        run: docker push ${IRON_BANK_REGISTRY}/mindex/mindex-api:${{ github.sha }}

  agentic-fallback:
    if: failure()
    needs: [build-hardened-image]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Agentic Healing
        env:
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
        run: |
          if [ -z "$AGENT_API_KEY" ]; then echo "AGENT_API_KEY not set; skipping"; exit 0; fi
          curl -fsS -X POST https://api.mycosoft.com/agent/auto-fix \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $AGENT_API_KEY" \
            -d "{\"repo\": \"$GITHUB_REPOSITORY\", \"run_id\": \"$GITHUB_RUN_ID\"}"
