# action-label-syncer: Harmonize labels
name: Sync labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: micnncim/action-label-syncer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          manifest: .github/labels.yml
          prune: false

  agentic-fallback:
    if: failure()
    needs: [sync]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Agentic Healing
        env:
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
        run: |
          if [ -z "$AGENT_API_KEY" ]; then echo "AGENT_API_KEY not set; skipping"; exit 0; fi
          curl -fsS -X POST https://api.mycosoft.com/agent/auto-fix \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $AGENT_API_KEY" \
            -d "{\"repo\": \"$GITHUB_REPOSITORY\", \"run_id\": \"$GITHUB_RUN_ID\"}"
